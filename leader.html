<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Топ лидеров PD</title>
  <link rel="icon" type="image/png" href="favicon1.ico">
  <link rel="apple-touch-icon" href="favicon1.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --text:#f3f6ff;

      --accent1:#ff2d7a;
      --accent2:#2ef9ff;
      --accent3:#a855f7;
      --accent4:#ff4d5e;

      --bg0:#06070f;

      --glass: rgba(8, 10, 24, .55);
      --glass2: rgba(0,0,0,.22);

      --b1: rgba(255,255,255,.10);
      --b2: rgba(255,255,255,.16);
      --ring: rgba(46,249,255,.42);

      --shadow-s: 0 10px 32px rgba(0,0,0,.28);
      --shadow-m: 0 18px 64px rgba(0,0,0,.44);
      --shadow-l: 0 28px 96px rgba(0,0,0,.62);

      --rXL: 30px;
      --rL: 24px;

      --ease: cubic-bezier(.2,.9,.1,1);
      --ease2: cubic-bezier(.16,1,.3,1);

      --dur-quick: 240ms;
      --dur: 520ms;
      --dur-slow: 820ms;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html{ scroll-behavior: smooth; }

    body{
      min-height:100vh;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:22px;
      overflow-x:hidden;
      background: url("fon.png") center / cover no-repeat fixed;
      background-color: var(--bg0);
      position:relative;
      filter: none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-4;
      background:
        radial-gradient(1200px 560px at 50% 0%, rgba(168,85,247,.26), transparent 62%),
        radial-gradient(900px 520px at 12% 12%, rgba(255,45,122,.22), transparent 58%),
        radial-gradient(900px 520px at 88% 18%, rgba(46,249,255,.18), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.48) 0%, rgba(0,0,0,.26) 45%, rgba(0,0,0,.62) 100%);
      mix-blend-mode: normal;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-3;
      background:
        radial-gradient(740px 480px at 18% 18%, rgba(255,45,122,.18), transparent 62%),
        radial-gradient(820px 520px at 82% 22%, rgba(46,249,255,.14), transparent 64%),
        linear-gradient(120deg,
          rgba(255,45,122,.10) 0%,
          rgba(46,249,255,.08) 42%,
          rgba(168,85,247,.10) 100%
        ),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.16));
      mix-blend-mode: screen;
      opacity: .70;
      filter: blur(0.2px);
    }

    .bg-live{
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events:none;
      overflow:hidden;
    }

    .bg-live .scanlines{
      position:absolute; inset:0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.06) 0px,
          rgba(255,255,255,.06) 1px,
          rgba(0,0,0,0) 3px,
          rgba(0,0,0,0) 7px
        );
      opacity:.055;
      mix-blend-mode: overlay;
      animation: scanMove 7.5s linear infinite;
    }
    @keyframes scanMove{
      0%{ transform: translateY(0); }
      100%{ transform: translateY(18px); }
    }

    .bg-live .particles{
      position:absolute; inset:0;
      opacity:.14;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 76%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 66%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 60% 52%, rgba(255,45,122,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 62%, rgba(46,249,255,.16) 0 1px, transparent 2px);
      background-size: 520px 520px, 680px 680px, 760px 760px, 900px 900px, 700px 700px, 820px 820px;
      animation: particlesDrift 52s linear infinite;
    }
    @keyframes particlesDrift{
      0%{ transform: translate3d(0,0,0); }
      100%{ transform: translate3d(-3%, 2%, 0); }
    }

    .bg-live .vignette{
      position:absolute; inset:-2px;
      background: radial-gradient(circle at center, transparent 0 52%, rgba(0,0,0,.50) 78%, rgba(0,0,0,.84) 100%);
      opacity:.92;
    }

    @media (max-width: 900px){
      body{ background-attachment: scroll; }
    }

    #app{
      width:100%;
      max-width:1200px;
      position:relative;
      z-index:1;
    }

    .page-header{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      margin-bottom: 14px;
      padding-top: 6px;
    }

    .page-title-block{
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      padding: 8px 12px;
      transform: translateZ(0);
    }

    .page-title{
      font-size:56px;
      font-weight:900;
      letter-spacing:.02em;
      text-shadow:
        0 0 16px rgba(255,45,122,.22),
        0 0 34px rgba(46,249,255,.14),
        0 0 52px rgba(168,85,247,.10);
      position:relative;
      transform: translateZ(0);
      user-select:none;
      transition: filter var(--dur) var(--ease), transform var(--dur) var(--ease);
    }

    .page-title.glitching{
      filter: drop-shadow(0 0 18px rgba(46,249,255,.14)) drop-shadow(0 0 22px rgba(255,45,122,.14));
      transform: translateY(-1px);
    }

    .page-title::before,
    .page-title::after{
      content: attr(data-text);
      position:absolute;
      left:0; top:0;
      width:100%;
      opacity:0;
      pointer-events:none;
      mix-blend-mode: screen;
      filter: blur(.35px);
      transform: translateZ(0);
    }
    .page-title.glitching::before{
      opacity:.65;
      color: rgba(46,249,255,.95);
      transform: translate3d(-1.5px, 0, 0);
      animation: glitchA 320ms var(--ease2) 1;
    }
    .page-title.glitching::after{
      opacity:.55;
      color: rgba(255,45,122,.95);
      transform: translate3d(1.5px, 0, 0);
      animation: glitchB 320ms var(--ease2) 1;
    }
    @keyframes glitchA{
      0%{ clip-path: inset(0 0 70% 0); }
      35%{ clip-path: inset(20% 0 40% 0); }
      70%{ clip-path: inset(55% 0 12% 0); }
      100%{ clip-path: inset(0 0 0 0); }
    }
    @keyframes glitchB{
      0%{ clip-path: inset(70% 0 0 0); }
      35%{ clip-path: inset(35% 0 30% 0); }
      70%{ clip-path: inset(10% 0 60% 0); }
      100%{ clip-path: inset(0 0 0 0); }
    }

    .user-tag{
      font-size:12px;
      color: rgba(243,246,255,.62);
      margin-top:2px;
      opacity: .95;
      transition: opacity var(--dur) var(--ease);
    }

    .page-header-actions{
      position:absolute;
      right:0;
      top:0;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      border: 1px solid rgba(46,249,255,.22);
      background: rgba(0,0,0,.14);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05) inset,
        0 0 26px rgba(46,249,255,.10),
        0 0 24px rgba(255,45,122,.08);
      color: rgba(243,246,255,.92);
      cursor:pointer;
      border-radius: 12px;
      transition: transform var(--dur-quick) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
      will-change: transform;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,45,122,.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 0 34px rgba(46,249,255,.16),
        0 0 54px rgba(255,45,122,.18),
        0 0 62px rgba(168,85,247,.10);
    }
    .btn:active{ transform: translateY(0px) scale(.99); }
    .btn-sm{ padding: 11px 18px; font-size: 14px; }

    .btn-outline{
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.10);
      color: rgba(243,246,255,.92);
      cursor:pointer;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 14px;
      transition: transform var(--dur-quick) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
      will-change: transform;
    }
    .btn-outline:hover{
      transform: translateY(-1px);
      border-color: rgba(46,249,255,.34);
      box-shadow: 0 0 24px rgba(46,249,255,.10);
    }
    .btn-outline:active{ transform: translateY(0px) scale(.99); }

    :focus-visible{
      outline: 2px solid var(--ring);
      outline-offset: 3px;
      border-radius: 10px;
    }

    .leader-panel{ background: transparent; border: none; box-shadow: none; }

    .leader-panel-header{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      margin-bottom: 14px;
      position:relative;
      z-index:2;
      width: 100%;
    }

    .leader-panel-header.sticky{
      position: sticky;
      top: 10px;
      padding: 10px 10px 12px;
      border-radius: 22px;
      background: rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 54px rgba(0,0,0,.26);
    }

    .leader-tabs{
      width: min(860px, 100%);
      margin: 0 auto;
      display:flex;
      gap: 14px;
      align-items: stretch;
      justify-content: center;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
      perspective: 1200px;
      position: relative;
      transform: translateZ(0);
    }

    .tab-flow{
      position:absolute;
      left: 0;
      top: 0;
      width: 100px;
      height: 52px;
      border-radius: 22px;
      pointer-events:none;
      z-index: 0;
      opacity: 0;
      transform: translate3d(0,0,0) scale(.98);
      transition:
        left 860ms var(--ease2),
        top 860ms var(--ease2),
        width 860ms var(--ease2),
        height 860ms var(--ease2),
        transform 860ms var(--ease2),
        opacity 520ms var(--ease2),
        filter 860ms var(--ease2);
      background:
        radial-gradient(900px 260px at 15% 20%, rgba(255,45,122,.18), transparent 55%),
        radial-gradient(900px 260px at 85% 25%, rgba(46,249,255,.16), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.22));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 18px 70px rgba(0,0,0,.34),
        0 0 48px rgba(46,249,255,.10),
        0 0 48px rgba(255,45,122,.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      filter: saturate(1.12) brightness(1.02);
    }

    .tab-flow::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius: 24px;
      background: conic-gradient(
        from 0deg,
        rgba(46,249,255,0) 0deg,
        rgba(46,249,255,.70) 90deg,
        rgba(255,45,122,.76) 180deg,
        rgba(168,85,247,.64) 270deg,
        rgba(46,249,255,0) 360deg
      );
      opacity: .55;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 2px;
      filter: blur(.22px);
      animation: tabFlowSpin 9.5s linear infinite;
    }

    @keyframes tabFlowSpin{ to { transform: rotate(360deg); } }

    .leader-tab{
      flex: 1 1 0;
      min-width: 0 !important;
      white-space: nowrap;
      position: relative;
      border: 0;
      border-radius: 22px;
      padding: 16px 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      font-weight: 1000;
      font-size: 15px;
      letter-spacing: .10em;
      text-transform: uppercase;
      cursor: pointer;
      color: rgba(243,246,255,.78);
      background: rgba(0,0,0,.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06) inset,
        0 18px 54px rgba(0,0,0,.34);
      transform: translateZ(0);
      will-change: transform, box-shadow, filter;
      transition:
        transform 780ms var(--ease2),
        box-shadow 780ms var(--ease2),
        filter 780ms var(--ease2),
        color 520ms var(--ease2);
      overflow:hidden;
      z-index: 1;
    }

    .leader-tab::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius: 24px;
      background: conic-gradient(
        from 0deg,
        rgba(46,249,255,0) 0deg,
        rgba(46,249,255,.75) 90deg,
        rgba(255,45,122,.78) 180deg,
        rgba(168,85,247,.68) 270deg,
        rgba(46,249,255,0) 360deg
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 2px;
      opacity: .22;
      filter: blur(.25px);
      transition: opacity 780ms var(--ease2), filter 780ms var(--ease2);
      pointer-events:none;
    }

    .leader-tab::after{
      content:"";
      position:absolute;
      inset: 2px;
      border-radius: 20px;
      background:
        radial-gradient(800px 220px at 15% 15%, rgba(255,45,122,.10), transparent 60%),
        radial-gradient(780px 240px at 85% 25%, rgba(46,249,255,.09), transparent 58%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.18));
      opacity: .85;
      pointer-events:none;
    }

    .leader-tab .icon{
      filter: drop-shadow(0 0 12px rgba(46,249,255,.10));
      transform: translateZ(0);
    }

    .leader-tab:hover{
      color: rgba(255,255,255,.96);
      transform:
        translateY(-3px)
        perspective(1200px)
        rotateY(-10deg)
        rotateZ(-1.2deg)
        scale(1.015);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.07) inset,
        0 26px 92px rgba(0,0,0,.52),
        0 0 38px rgba(46,249,255,.14),
        0 0 44px rgba(255,45,122,.12);
      filter: saturate(1.10) brightness(1.02);
    }

    .leader-tab:hover::before{
      opacity: .78;
      filter: blur(.18px);
    }

    .leader-tab:active{
      transform:
        translateY(-1px)
        perspective(1200px)
        rotateY(-7deg)
        rotateZ(-0.8deg)
        scale(1.01);
    }

    .leader-tab.active{
      color: #fff;
      filter: saturate(1.12) brightness(1.03);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08) inset,
        0 30px 110px rgba(0,0,0,.60),
        0 0 54px rgba(46,249,255,.16),
        0 0 58px rgba(255,45,122,.14);
    }

    .leader-tab.active::before{
      opacity: .95;
      animation: tabGlowSpin 8.5s linear infinite;
    }

    @keyframes tabGlowSpin{
      to{ transform: rotate(360deg); }
    }

    .leader-tabs.is-switching .leader-tab{
      transition:
        transform 920ms var(--ease2),
        box-shadow 920ms var(--ease2),
        filter 920ms var(--ease2),
        color 720ms var(--ease2);
    }

    @media (max-width: 720px){
      .leader-tabs{
        flex-direction: column;
        gap: 10px;
        perspective: none;
      }
      .leader-tab{
        border-radius: 20px;
        padding: 16px 16px;
      }
      .leader-tab:hover{
        transform: translateY(-2px) scale(1.01);
      }
      .tab-flow{
        border-radius: 20px;
      }
      .tab-flow::before{
        border-radius: 22px;
      }
    }

    .leader-date{
      font-size: 18px;
      letter-spacing:.10em;
      color: rgba(243,246,255,.74);
      margin-top: 4px;
      text-shadow: 0 0 18px rgba(46,249,255,.10);
      transform: translateZ(0);
    }

    .crossfade{
      position:relative;
      display:inline-block;
      min-height: 1em;
    }
    .crossfade .cf-out{
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), filter var(--dur) var(--ease);
    }
    .crossfade.is-swapping .cf-out{
      opacity: 0;
      transform: translateY(-4px);
      filter: blur(2px);
    }
    .crossfade .cf-in{
      position:absolute;
      left:0; right:0;
      top:0;
      opacity: 0;
      transform: translateY(6px);
      filter: blur(3px);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease), filter var(--dur) var(--ease);
      pointer-events:none;
    }
    .crossfade.is-swapping .cf-in{
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .leaders-wrapper{
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap:18px;
      position:relative;
      z-index:1;
      transform: translateZ(0);
      will-change: transform, opacity, filter;
    }

    .leaders-wrapper.swap{
      animation-duration: var(--dur-slow);
      animation-timing-function: var(--ease2);
      animation-fill-mode: both;
    }

    @keyframes swapA{
      0%{ opacity:0; transform: translateY(12px); filter: blur(8px); }
      100%{ opacity:1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes swapB{
      0%{ opacity:0; transform: translateX(18px) scale(.98); filter: blur(8px); }
      100%{ opacity:1; transform: translateX(0) scale(1); filter: blur(0); }
    }
    @keyframes swapC{
      0%{ opacity:0; transform: perspective(900px) rotateX(16deg) translateY(12px); filter: blur(10px); }
      100%{ opacity:1; transform: perspective(900px) rotateX(0deg) translateY(0); filter: blur(0); }
    }
    @keyframes swapD{
      0%{ opacity:0; transform: translateY(8px) scale(.96); clip-path: inset(0 0 100% 0); filter: blur(8px); }
      100%{ opacity:1; transform: translateY(0) scale(1); clip-path: inset(0 0 0 0); filter: blur(0); }
    }
    @keyframes swapE{
      0%{ opacity:0; transform: translateY(10px); filter: blur(9px) saturate(1.25); }
      60%{ opacity:1; transform: translateY(-2px); filter: blur(0) saturate(1.1); }
      100%{ opacity:1; transform: translateY(0); filter: blur(0) saturate(1); }
    }
    .leaders-wrapper.v1{ animation-name: swapA; }
    .leaders-wrapper.v2{ animation-name: swapB; }
    .leaders-wrapper.v3{ animation-name: swapC; }
    .leaders-wrapper.v4{ animation-name: swapD; }
    .leaders-wrapper.v5{ animation-name: swapE; }

    .leader-card{
      position:relative;
      display:flex;
      align-items:center;
      gap: 22px;
      padding: 18px 24px;
      border-radius: var(--rL);
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(46,249,255,.14);
      box-shadow: 0 18px 70px rgba(0,0,0,.38);
      overflow:hidden;
      clip-path: polygon(
        0% 0%,
        100% 0%,
        100% calc(100% - 26px),
        calc(100% - 26px) 100%,
        0% 100%,
        0% 0%
      );
      transition:
        transform var(--dur) var(--ease),
        box-shadow var(--dur) var(--ease),
        background var(--dur) var(--ease),
        border-color var(--dur) var(--ease),
        filter var(--dur) var(--ease);
      contain: paint;
      will-change: transform;
    }

    .leader-card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius: calc(var(--rL) + 2px);
      background: linear-gradient(90deg,
        rgba(46,249,255,0) 0%,
        rgba(46,249,255,.95) 16%,
        rgba(255,45,122,.95) 38%,
        rgba(168,85,247,.88) 60%,
        rgba(255,45,122,.95) 82%,
        rgba(46,249,255,0) 100%
      );
      background-size: 380% 100%;
      background-position: 0% 50%;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 3px;
      opacity: .95;
      filter: blur(.18px);
      pointer-events:none;
      animation: borderFlow 11s linear infinite;
      animation-play-state: paused;
    }
    .leader-card:hover::before{ animation-play-state: running; }

    @keyframes borderFlow{
      0%{ background-position:   0% 50%; }
      100%{ background-position: 380% 50%; }
    }

    .leader-card:hover{
      transform: translateY(-6px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0,0,0,.12);
      border-color: rgba(255,45,122,.22);
      box-shadow:
        0 26px 92px rgba(0,0,0,.52),
        0 0 42px rgba(46,249,255,.18),
        0 0 54px rgba(255,45,122,.18),
        0 0 52px rgba(168,85,247,.12);
      filter: saturate(1.08) brightness(1.02);
    }

    .leader-card .sheen{
      position:absolute;
      inset:-40% -60%;
      pointer-events:none;
      background: linear-gradient(115deg,
        transparent 0%,
        rgba(255,255,255,.00) 35%,
        rgba(255,255,255,.16) 45%,
        rgba(255,45,122,.12) 50%,
        rgba(46,249,255,.12) 55%,
        rgba(255,255,255,.00) 65%,
        transparent 100%
      );
      transform: translateX(-60%) rotate(10deg);
      opacity: 0;

  <div class="cursor-glow" id="cursor-glow"></div>

  <div id="app">
    <div class="page-header">

  <script>
    let currentUser = null;

    function loadSession() {
      try { return JSON.parse(localStorage.getItem("pp_user")); }
      catch { return null; }
    }

    function canBulkEdit(user) {
      const role = String(user?.role || "").trim().toLowerCase();
      return role === "admin" || role === "creator";
    }

    const API_BASE = "https://world-script-api.onrender.com/api";

    const memCache = new Map();
    const CACHE_CFG = { day: 60000, week: 180000 };

    function nowMs(){ return Date.now(); }
    function cacheKey(path){ return "cache:" + path; }

    function readCache(path){
      const k = cacheKey(path);
      const mem = memCache.get(k);
      if (mem && mem.exp > nowMs()) return mem.val;

      try{
        const raw = localStorage.getItem(k);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || obj.exp <= nowMs()) return null;
        memCache.set(k, obj);
        return obj.val;
      }catch{ return null; }
    }

    function writeCache(path, val, ttl){
      const k = cacheKey(path);
      const obj = { val, exp: nowMs() + ttl };
      memCache.set(k, obj);
      try{ localStorage.setItem(k, JSON.stringify(obj)); }catch{}
    }

    function invalidateCache(path){
      const k = cacheKey(path);
      memCache.delete(k);
      try{ localStorage.removeItem(k); }catch{}
    }

    let activeController = null;

    async function apiGet(path, opts = {}) {
      const useCache = Number.isFinite(opts.cacheTtl) && opts.cacheTtl > 0;
      if (useCache){
        const cached = readCache(path);
        if (cached) return cached;
      }

      if (opts.abortPrev && activeController){
        try{ activeController.abort(); }catch{}
      }

      const controller = new AbortController();
      if (opts.abortPrev) activeController = controller;

      const r = await fetch(API_BASE + path, { credentials: "include", signal: controller.signal });
      if (!r.ok) throw new Error(await r.text());
      const json = await r.json();
      if (useCache) writeCache(path, json, opts.cacheTtl);
      return json;
    }

    async function apiPost(path, body, extraHeaders = {}) {
      const r = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...extraHeaders },
        credentials: "include",
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    const toastHost = document.getElementById("toast-host");

    function toastIcon(type){
      if (type === "ok") return "✅";
      if (type === "warn") return "⚠️";
      if (type === "err") return "⛔";
      return "✨";
    }

    function toastTitle(type){
      if (type === "ok") return "Готово";
      if (type === "warn") return "Внимание";
      if (type === "err") return "Ошибка";
      return "Сообщение";
    }

    function showToast(text, type = "info", ms = 2600){
      if (!toastHost) return;
      const el = document.createElement("div");
      el.className = "toast";
      el.innerHTML = `
        <div class="toast-ico">${toastIcon(type)}</div>
        <div class="toast-body">
          <div class="toast-title">${toastTitle(type)}</div>
          <div class="toast-text"></div>
        </div>
        <button class="toast-close" aria-label="close">✕</button>
      `;
      el.querySelector(".toast-text").textContent = text || "";
      const close = () => {
        el.classList.add("out");
        setTimeout(() => { try{ el.remove(); }catch{} }, 460);
      };
      el.querySelector(".toast-close").onclick = close;
      toastHost.appendChild(el);
      setTimeout(close, ms);
    }

    const errorModal = document.getElementById("error-modal");
    const errorModalText = document.getElementById("error-modal-text");
    const errorModalClose = document.getElementById("error-modal-close");

    function showErrorModal(message) {
      if (!errorModal || !errorModalText) return;
      errorModalText.textContent = message || "Неизвестная ошибка";
      errorModal.classList.add("active");
    }
    if (errorModalClose) errorModalClose.onclick = () => errorModal.classList.remove("active");

    function monthRuUpper(monthIndex) {
      const m = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
      return m[monthIndex] || "";
    }
    function parseDateOnly(iso) {
      const [y,m,d] = String(iso).split("-").map(Number);
      return new Date(y, (m || 1) - 1, d || 1);
    }
    function formatPeriodRu(startISO, endISO) {
      const s = parseDateOnly(startISO);
      const e = parseDateOnly(endISO);
      return `С ${s.getDate()} ${monthRuUpper(s.getMonth())} ${s.getFullYear()} по ${e.getDate()} ${monthRuUpper(e.getMonth())} ${e.getFullYear()}`;
    }

    function deptClass(dept){
      const d = String(dept || "").trim().toUpperCase();
      if (d === "LSPD") return "lspd";
      if (d === "SFPD") return "sfpd";
      if (d === "LVPD") return "lvpd";
      return "unk";
    }

    function toISODateOnly(x){
      const s = String(x || "").trim();
      return s ? s.slice(0, 10) : "0000-00-00";
    }

    function sortWeeksDesc(rows){
      return (rows || []).slice().sort((a, b) => {
        const ae = toISODateOnly(a?.week_end || a?.week_start);
        const be = toISODateOnly(b?.week_end || b?.week_start);
        if (be > ae) return 1;
        if (be < ae) return -1;
        return 0;
      });
    }

    function pickNum(row, ...keys){
      for (const k of keys){
        if (row && row[k] != null && row[k] !== ""){
          const v = Number(row[k]);
          if (Number.isFinite(v)) return v;
        }
      }
      return null;
    }

    function sumDeptAshFromRow(row){
      const lspd = pickNum(row, "lspd_ash", "ash_lspd", "total_lspd", "lspd_total", "lspd");
      const sfpd = pickNum(row, "sfpd_ash", "ash_sfpd", "total_sfpd", "sfpd_total", "sfpd");
      const lvpd = pickNum(row, "lvpd_ash", "ash_lvpd", "total_lvpd", "lvpd_total", "lvpd");
      if (lspd !== null || sfpd !== null || lvpd !== null){
        return { LSPD: lspd ?? 0, SFPD: sfpd ?? 0, LVPD: lvpd ?? 0 };
      }
      const acc = { LSPD: 0, SFPD: 0, LVPD: 0 };
      const put = (dept, ash) => {
        const d = String(dept || "").trim().toUpperCase();
        if (d !== "LSPD" && d !== "SFPD" && d !== "LVPD") return;
        const v = Number(ash || 0);
        acc[d] += (Number.isFinite(v) ? v : 0);
      };
      put(row?.dept_1, row?.ash_1);
      put(row?.dept_2, row?.ash_2);
      put(row?.dept_3, row?.ash_3);
      return acc;
    }

    function rankDeptsFromLast3Weeks(rows){
      const sorted = sortWeeksDesc(rows);
      const last3 = sorted.slice(0, 3);
      const total = { LSPD: 0, SFPD: 0, LVPD: 0 };
      for (const row of last3){
        const s = sumDeptAshFromRow(row);
        total.LSPD += Number(s.LSPD || 0);
        total.SFPD += Number(s.SFPD || 0);
        total.LVPD += Number(s.LVPD || 0);
      }
      return [
        { dept: "LSPD", val: total.LSPD },
        { dept: "SFPD", val: total.SFPD },
        { dept: "LVPD", val: total.LVPD },
      ].sort((a,b) => b.val - a.val);
    }

    function animateNumber(el, from, to, ms = 560){
      if (!el) return;
      const a = Number(from);
      const b = Number(to);
      if (!Number.isFinite(a) || !Number.isFinite(b)){
        el.textContent = String(to);
        el.classList.add("swap");
        setTimeout(() => el.classList.remove("swap"), 620);
        return;
      }
      const start = performance.now();
      const ease = (t) => 1 - Math.pow(1 - t, 3);
      const step = (now) => {
        const p = Math.min(1, (now - start) / ms);
        const v = Math.round(a + (b - a) * ease(p));
        el.textContent = String(v);
        if (p < 1) requestAnimationFrame(step);
      };
      el.classList.add("swap");
      requestAnimationFrame(step);
      setTimeout(() => el.classList.remove("swap"), 620);
    }

    function animateAllNumbers(root){
      const scope = root || document;
      scope.querySelectorAll(".num-anim").forEach(el => {
        const to = Number(el.getAttribute("data-num") || el.textContent || 0);
        const prev = Number(el.getAttribute("data-prev") || el.textContent || 0);
        el.setAttribute("data-prev", String(to));
        animateNumber(el, prev, to, 620);
      });
    }

    function bestDeptForRow(row){
      const totals = sumDeptAshFromRow(row);
      const list = [
        { dept: "LSPD", val: Number(totals.LSPD||0) },
        { dept: "SFPD", val: Number(totals.SFPD||0) },
        { dept: "LVPD", val: Number(totals.LVPD||0) },
      ].sort((a,b)=>b.val-a.val);
      return list[0]?.dept || "—";
    }

    function trendForRow(curr, prev){
      const a = Number(curr?.total_ash || 0);
      const b = Number(prev?.total_ash || 0);
      const diff = a - b;
      if (diff > 0) return { cls:"trend-up", sym:"↑", diff };
      if (diff < 0) return { cls:"trend-down", sym:"↓", diff };
      return { cls:"trend-flat", sym:"→", diff: 0 };
    }

    function renderWeeklySummaryBlock(row, idx, fullList){
      const wrap = document.createElement("div");
      wrap.className = "week-summary";
      wrap.setAttribute("data-week", String(row?.week_end || row?.week_start || ""));

      const sheen = document.createElement("div");
      sheen.className = "sheen";
      wrap.appendChild(sheen);

      const head = document.createElement("div");
      head.className = "week-summary-head";

      const period = document.createElement("div");
      period.className = "week-summary-period";
      period.innerHTML = `<span class="dot"></span>${formatPeriodRu(row.week_start, row.week_end)}`;

      const orbit = document.createElement("div");
      orbit.className = "week-total-orbit";

      const chip = document.createElement("div");
      chip.className = "week-total-chip";
      chip.innerHTML = `<span class="label">ОБЩЕЕ</span><span class="num num-anim" data-num="${Number(row.total_ash || 0)}">${Number(row.total_ash || 0)}</span>`;
      orbit.appendChild(chip);

      head.appendChild(period);
      head.appendChild(orbit);
      wrap.appendChild(head);

      const meta = document.createElement("div");
      meta.className = "week-meta";

      const total = Number(row.total_ash || 0);
      const avg = Math.round(total / 7);
      const bestDept = bestDeptForRow(row);

      const prev = fullList?.[idx + 1] || null;
      const tr = prev ? trendForRow(row, prev) : { cls:"trend-flat", sym:"→", diff:0 };

      const diffAbs = Math.abs(tr.diff);
      const diffText = prev ? `${tr.sym} ${diffAbs}` : `→ —`;

      meta.innerHTML = `
        <div class="meta-chip">Всего: <strong><span class="num-anim" data-num="${total}">${total}</span></strong></div>
        <div class="meta-chip">Среднее/день: <strong><span class="num-anim" data-num="${avg}">${avg}</span></strong></div>
        <div class="meta-chip">Лучший: <strong>${bestDept}</strong></div>
        <div class="meta-chip">Тренд: <strong class="${tr.cls}">${diffText}</strong></div>
      `;

      const top3 = document.createElement("div");
      top3.className = "week-top3";

      const slots = [
        { place: 1, nick: row.nick_1, dept: row.dept_1, ash: row.ash_1 },
        { place: 2, nick: row.nick_2, dept: row.dept_2, ash: row.ash_2 },
        { place: 3, nick: row.nick_3, dept: row.dept_3, ash: row.ash_3 },
      ];

      for (const s of slots){
        const slot = document.createElement("div");
        slot.className = "week-slot";

        const rank = document.createElement("div");
        rank.className = "rank";
        const emoji = s.place === 1 ? "🏆" : (s.place === 2 ? "🥈" : "🥉");
        rank.innerHTML = `<span class="emoji">${emoji}</span><span>${s.place} место</span>`;

        const nameLine = document.createElement("div");
        nameLine.className = "name-line";

        const nick = document.createElement("div");
        nick.className = "nick";
        nick.textContent = (s.nick || "—").trim() || "—";

        const deptPill = document.createElement("div");
        deptPill.className = "dept-pill " + deptClass(s.dept);
        deptPill.textContent = (String(s.dept || "").trim().toUpperCase() || "—");

        nameLine.appendChild(nick);
        nameLine.appendChild(deptPill);

        const ash = document.createElement("div");
        ash.className = "ash";
        const val = Number(s.ash || 0);
        ash.innerHTML = `<span class="num num-anim" data-num="${val}">${val}</span><span class="unit">АШ</span>`;

        slot.appendChild(rank);
        slot.appendChild(nameLine);
        slot.appendChild(ash);

        top3.appendChild(slot);
      }

      wrap.appendChild(meta);
      wrap.appendChild(top3);
      return wrap;
    }

    function updateTabFlowFor(btn, immediate = false){
      if(!tabsWrap || !tabFlow || !btn) return;
      const w = tabsWrap.getBoundingClientRect();
      const b = btn.getBoundingClientRect();
      const left = (b.left - w.left) + tabsWrap.scrollLeft;
      const top = (b.top - w.top) + tabsWrap.scrollTop;
      const width = b.width;
      const height = b.height;

      if (immediate){
        tabFlow.style.transition = "none";
        tabFlow.style.left = left + "px";
        tabFlow.style.top = top + "px";
        tabFlow.style.width = width + "px";
        tabFlow.style.height = height + "px";
        tabFlow.style.opacity = "1";
        tabFlow.style.transform = "translate3d(0,0,0) scale(1)";
        void tabFlow.offsetWidth;
        tabFlow.style.transition = "";
        return;
      }

      tabFlow.style.left = left + "px";
      tabFlow.style.top = top + "px";
      tabFlow.style.width = width + "px";
      tabFlow.style.height = height + "px";
      tabFlow.style.opacity = "1";
      tabFlow.style.transform = "translate3d(0,0,0) scale(1)";
    }

    function syncTabFlowImmediate(){
      const active = tabDay?.classList.contains("active") ? tabDay : tabWeek;
      if (active) updateTabFlowFor(active, true);
    }

    function crossfadeSwap(){
      runSwapAnimation();
      const restore = stabilizeHeight();
      setTimeout(restore, 900);
    }

    function setActiveTabSmooth(nextBtn){
      if(!tabDay || !tabWeek || !tabsWrap) return;
      const prevBtn = tabDay.classList.contains("active") ? tabDay : tabWeek;
      if (prevBtn === nextBtn) return;
      if (switchingTabs) return;
      switchingTabs = true;

      tabsWrap.classList.add("is-switching");

      updateTabFlowFor(nextBtn, false);

      prevBtn.style.transition = "transform 920ms var(--ease2), filter 920ms var(--ease2)";
      nextBtn.style.transition = "transform 920ms var(--ease2), filter 920ms var(--ease2)";

      prevBtn.style.transform = "translateY(1px) scale(.995)";
      prevBtn.style.filter = "blur(.6px) saturate(.95)";

      nextBtn.style.transform = "translateY(-2px) scale(1.01)";
      nextBtn.style.filter = "saturate(1.08) brightness(1.02)";

      requestAnimationFrame(() => {
        tabDay.classList.remove("active");
        tabWeek.classList.remove("active");
        nextBtn.classList.add("active");

        setTimeout(() => {
          prevBtn.style.transform = "";
          prevBtn.style.filter = "";
          nextBtn.style.transform = "";
          nextBtn.style.filter = "";
          prevBtn.style.transition = "";
          nextBtn.style.transition = "";
          tabsWrap.classList.remove("is-switching");
          switchingTabs = false;
        }, 980);
      });
    }

    async function loadLeaders(){
      currentPeriod = "day";
      activeDeptFilter = null;
      if (deptPodiumEl) deptPodiumEl.style.display = "none";

      setDateDay();
      crossfadeSwap();
      skeletonDay();

      try {
        const rows = await apiGet("/leaders/day?limit=3", { abortPrev: true, cacheTtl: CACHE_CFG.day });
        if (!rows || !rows.length){
          emptyState("Нет данных за день", "Пока никто не набрал активность. Загляни чуть позже.", "🛰️");
          return;
        }

        const slots = [0,1,2].map((i) => rows?.[i] || null);
        leadersWrapper.innerHTML = "";
        slots.forEach((row, idx) => leadersWrapper.appendChild(renderLeaderCard(idx + 1, row)));
        animateAllNumbers(leadersWrapper);
      } catch (e) {
        if (String(e?.name || "").toLowerCase() === "aborterror") return;
        emptyState("Ошибка сети", "Не удалось загрузить рейтинг дня. Проверь соединение и попробуй снова.", "📡");
        showToast("Не удалось загрузить данные дня.", "err", 2800);
      }
    }

    async function loadWeeklyBlocks(){
      currentPeriod = "week";

      setDateBlank();
      crossfadeSwap();
      skeletonWeek();

      try {
        const data = await apiGet("/leaders/week?limit=8", { abortPrev: true, cacheTtl: CACHE_CFG.week });
        weeklyData = Array.isArray(data) ? data : [];

        if (!weeklyData.length){
          if (deptPodiumEl) deptPodiumEl.style.display = "none";
          emptyState("Нет данных по неделям", "Сводки появятся после закрытия первой недели.", "🗓️");
          return;
        }

        if (deptPodiumEl) {
          deptPodiumEl.style.display = "grid";
          const ranked = rankDeptsFromLast3Weeks(weeklyData);
          renderDeptPodium(ranked);
        }

        leadersWrapper.innerHTML = "";
        weeklyData.forEach((row, idx) => {
          leadersWrapper.appendChild(renderWeeklySummaryBlock(row, idx, weeklyData));
        });

        animateAllNumbers(leadersWrapper);
        applyWeekDeptHighlight();
      } catch (e) {
        if (String(e?.name || "").toLowerCase() === "aborterror") return;
        if (deptPodiumEl) deptPodiumEl.style.display = "none";
        emptyState("Ошибка загрузки", "Не удалось загрузить недельную активность. Попробуй ещё раз.", "🧯");
        showToast("Не удалось загрузить данные недели.", "err", 2800);
      }
    }

    function switchPeriod(period){
      if (period === currentPeriod) return;
      if (period === "week") loadWeeklyBlocks();
      else loadLeaders();
    }

    if (tabDay && tabWeek) {
      tabDay.onclick = () => {
        setActiveTabSmooth(tabDay);
        switchPeriod("day");
      };
      tabWeek.onclick = () => {
        setActiveTabSmooth(tabWeek);
        switchPeriod("week");
      };
    }

    window.addEventListener("resize", () => {
      syncTabFlowImmediate();
    });

    const editLeadersTopBtn = document.getElementById("edit-leaders-top");
    const bulkModal = document.getElementById("leaders-bulk-modal");
    const bulkFormsEl = document.getElementById("bulk-forms");
    const bulkCancelBtn = document.getElementById("bulk-cancel");
    const bulkSaveBtn = document.getElementById("bulk-save");
    const bulkErrorEl = document.getElementById("bulk-error");

    let bulkRows = [];
    let bulkAvatarByDept = {};

    function showBulkError(msg){
      if(!bulkErrorEl) return;
      bulkErrorEl.style.display = "block";
      bulkErrorEl.textContent = msg || "Ошибка.";
    }
    function hideBulkError(){
      if(!bulkErrorEl) return;
      bulkErrorEl.style.display = "none";
      bulkErrorEl.textContent = "";
    }

    function openBulkModal(){
      if(!canBulkEdit(currentUser)){
        showToast("Нет прав для редактирования.", "warn", 2400);
        return;
      }
      hideBulkError();
      bulkModal.classList.add("active");
    }

    function closeBulkModal(){
      bulkModal.classList.remove("active");
      bulkRows = [];
      bulkAvatarByDept = {};
      if (bulkFormsEl) bulkFormsEl.innerHTML = "";
      hideBulkError();
    }

    async function fetchLeadersForDepts(){
      return apiGet("/leaders/by-depts?depts=LSPD,SFPD,LVPD", { abortPrev: false, cacheTtl: 0 });
    }

    function createBulkCard(row){
      const wrap = document.createElement("div");
      wrap.style.border = "1px solid rgba(255,255,255,.12)";
      wrap.style.borderRadius = "14px";
      wrap.style.padding = "12px";
      wrap.style.display = "grid";
      wrap.style.gridTemplateColumns = "100px 1fr";
      wrap.style.gap = "12px";

      const avatar = document.createElement("div");
      avatar.className = "edit-avatar-preview";
      avatar.textContent = row.nick?.[0] || "?";

      if(row.avatar_url){
        avatar.innerHTML = `<img src="${row.avatar_url}">`;
      }

      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/*";
      fileInput.style.display = "none";

      avatar.onclick = () => fileInput.click();
      fileInput.onchange = e => {
        const f = e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          bulkAvatarByDept[row.department] = reader.result;
          avatar.innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(f);
      };

      const nickInput = document.createElement("input");
      nickInput.value = row.nick || "";
      const accInput = document.createElement("input");
      accInput.value = row.account_id || "";

      const right = document.createElement("div");
      right.innerHTML = `
        <div class="field"><label>${row.department} ник</label></div>
        <div class="field"><label>${row.department} аккаунт</label></div>
      `;
      right.children[0].appendChild(nickInput);
      right.children[1].appendChild(accInput);

      wrap.appendChild(avatar);
      wrap.appendChild(fileInput);
      wrap.appendChild(right);

      return { wrap, nickInput, accInput };
    }

    async function buildBulkModal(){
      bulkFormsEl.innerHTML = "";
      const sk = document.createElement("div");
      sk.className = "skeleton";
      sk.style.height = "220px";
      sk.style.borderRadius = "16px";
      bulkFormsEl.appendChild(sk);

      bulkRows = await fetchLeadersForDepts();
      bulkFormsEl.innerHTML = "";

      bulkRows.forEach(row => {
        const ui = createBulkCard(row);
        row._ui = ui;
        bulkFormsEl.appendChild(ui.wrap);
      });
    }

    async function saveBulk(){
      hideBulkError();

      for(const row of bulkRows){
        if(!row.id) return showBulkError(`Нет записи leaderinfo для ${row.department}`);
        if(!row._ui.nickInput.value || !row._ui.accInput.value) return showBulkError(`Заполни все поля (${row.department})`);
      }

      const rows = bulkRows.map(row => ({
        id: row.id,
        department: row.department,
        nick: row._ui.nickInput.value.trim(),
        account_id: row._ui.accInput.value.trim(),
        avatar_base64: bulkAvatarByDept[row.department] || null
      }));

      try {
        await apiPost("/leaders/bulk", { rows });
        invalidateCache("/leaders/day?limit=3");
        invalidateCache("/leaders/week?limit=8");
        closeBulkModal();
        showToast("Изменения сохранены.", "ok", 2200);
        currentPeriod === "week" ? loadWeeklyBlocks() : loadLeaders();
      } catch (e) {
        showBulkError(String(e.message || e));
        showToast("Не удалось сохранить изменения.", "err", 2800);
      }
    }

    if(editLeadersTopBtn){
      editLeadersTopBtn.onclick = async () => {
        openBulkModal();
        await buildBulkModal();
      };
    }
    if(bulkCancelBtn) bulkCancelBtn.onclick = closeBulkModal;
    if(bulkSaveBtn) bulkSaveBtn.onclick = saveBulk;

    const userTagEl = document.getElementById("user-tag");

    async function initPage() {
      currentUser = loadSession();
      if (userTagEl) userTagEl.textContent = "";

      const editBtn = document.getElementById("edit-leaders-top");
      if (editBtn) editBtn.style.display = "none";

      const myNick = String(currentUser?.nick || "").trim();

      if (editBtn && myNick) {
        try {
          const r = await apiGet(`/users/can-edit?nick=${encodeURIComponent(myNick)}`, { abortPrev: false, cacheTtl: 0 });
          if (r?.ok) editBtn.style.display = "inline-flex";
        } catch {}
      }

      setStickyHeader();
      setDateDay();

      syncTabFlowImmediate();
      await loadLeaders();
    }

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
